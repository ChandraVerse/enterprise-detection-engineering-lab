title: Mimikatz LSASS Memory Access
id: a3c2f1e8-9b4d-4c7a-8e2f-1d6b3a9c5f0e
status: production
description: |
  Detects Mimikatz attempting to access LSASS process memory for credential
  dumping via the sekurlsa::logonpasswords or lsadump modules.
  Sysmon Event ID 10 (ProcessAccess) with LSASS as the target process.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://github.com/gentilkiwi/mimikatz
author: Chandra Sekhar Chakraborty
date: 2025/11/01
modified: 2026/01/15
tags:
  - attack.credential_access
  - attack.t1003.001
  - attack.t1550.002
logsource:
  product: windows
  category: process_access
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - '0x1010'
      - '0x1410'
      - '0x147a'
      - '0x1418'
  filter_legitimate:
    SourceImage|contains:
      - '\MsMpEng.exe'
      - '\AntimalwareMiniFilter.exe'
      - '\wmiprvse.exe'
  condition: selection and not filter_legitimate
falsepositives:
  - AV / EDR products accessing LSASS for protection
  - Windows Defender Credential Guard telemetry
level: critical
fields:
  - SourceImage
  - TargetImage
  - GrantedAccess
  - CallTrace
