title: Suspicious Scheduled Task Creation via CLI
id: e2a6b5d4-7c3f-4b0a-8d4e-5f9c2b6a3e0d
status: production
description: |
  Detects creation of scheduled tasks using command-line tools (schtasks.exe or
  at.exe) with suspicious parameters indicative of persistence establishment.
  Covers common adversary patterns including tasks running from temp directories.
references:
  - https://attack.mitre.org/techniques/T1053/005/
author: Chandra Sekhar Chakraborty
date: 2025/11/14
modified: 2026/01/15
tags:
  - attack.persistence
  - attack.t1053.005
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains: '/create'
  selection_suspicious:
    CommandLine|contains:
      - '\AppData\Local\Temp'
      - '\AppData\Roaming'
      - '\Users\Public'
      - 'powershell'
      - 'cmd /c'
      - 'wscript'
      - 'cscript'
  condition: selection and selection_suspicious
falsepositives:
  - Software installers creating legitimate scheduled tasks
  - Antivirus update tasks
level: medium
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
