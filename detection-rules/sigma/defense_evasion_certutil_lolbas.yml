title: LOLBAS Abuse via Certutil Download or Decode
id: d7f1a0c9-2b8e-4a5f-3c9d-0e4b7a1f8d5c
status: production
description: |
  Detects abuse of certutil.exe as a Living Off the Land Binary (LOLBAS) for
  downloading files from the internet or decoding base64 content to disk.
  Adversaries use certutil to bypass application whitelisting and download
  malicious payloads while evading network monitoring.
references:
  - https://attack.mitre.org/techniques/T1218/
  - https://lolbas-project.github.io/lolbas/Binaries/Certutil/
author: Chandra Sekhar Chakraborty
date: 2025/11/25
modified: 2026/01/15
tags:
  - attack.defense_evasion
  - attack.t1218
  - attack.t1105
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\certutil.exe'
    CommandLine|contains:
      - '-urlcache'
      - '-verifyctl'
      - '-decode'
      - '-decodehex'
  selection_download:
    CommandLine|contains:
      - 'http://'
      - 'https://'
      - 'ftp://'
  condition: selection or selection_download
falsepositives:
  - Legitimate certificate management operations
  - PKI infrastructure management
level: high
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
