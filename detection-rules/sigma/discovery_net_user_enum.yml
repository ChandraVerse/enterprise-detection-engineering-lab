title: Account Discovery via Net User Commands
id: a4c8d7f6-9e5b-4d2c-0f6a-7b1e4d8c5a2f
status: production
description: |
  Detects adversary account and group enumeration using net.exe and net1.exe
  commands. These are commonly executed during the discovery phase to identify
  privileged accounts and domain structure.
references:
  - https://attack.mitre.org/techniques/T1087/001/
author: Chandra Sekhar Chakraborty
date: 2025/11/18
modified: 2026/01/15
tags:
  - attack.discovery
  - attack.t1087.001
  - attack.t1069
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
    CommandLine|contains:
      - 'user'
      - 'group'
      - 'localgroup'
      - 'accounts'
  selection_domain:
    CommandLine|contains:
      - '/domain'
      - 'domain admins'
      - 'enterprise admins'
  condition: selection
falsepositives:
  - Legitimate IT administrator enumeration tasks
  - Helpdesk software querying user accounts
level: low
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
